<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DompetKuPlus Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
            overflow-x:hidden;
        }

        #sidebar{
            width:260px;
            min-height:100vh;
            background:#111827;
            transition:.3s;
        }

        #sidebar.collapsed{ width:80px; }

        #sidebar.collapsed .logo-text,
        #sidebar.collapsed .menu-text{
            display:none;
        }

        .sidebar-link{
            color:white;
            text-decoration:none;
            padding:12px 15px;
            border-radius:12px;
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:8px;
            transition:.3s;
        }

        .sidebar-link:hover{ background:#1f2937; }

        .sidebar-link.active{
            background:linear-gradient(135deg,#2563eb,#4f46e5);
        }

        .content{ flex:1; padding:30px; }

        .topbar{
            background:white;
            border-radius:20px;
            padding:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.05);
        }

        .stat-card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.06);
            transition:.3s;
        }

        .stat-card:hover{ transform:translateY(-5px); }

        .icon-box{
            width:60px;
            height:60px;
            border-radius:15px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:24px;
        }

        .income{ background:#dcfce7; color:#16a34a; }
        .expense{ background:#fee2e2; color:#dc2626; }
        .balance{ background:#dbeafe; color:#2563eb; }

        .table-card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.06);
        }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div id="sidebar" class="p-3">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="text-white m-0">
                 <span class="logo-text">DompetKuPlus</span>
            </h4>

            <button id="toggleBtn" class="btn btn-sm btn-light">☰</button>
        </div>

        <a href="/" class="sidebar-link active">
            <i class="bi bi-grid-fill"></i>
            <span class="menu-text">Dashboard</span>
        </a>

        <a href="/transactions" class="sidebar-link">
            <i class="bi bi-cash-stack"></i>
            <span class="menu-text">Transaksi</span>
        </a>

        <a href="/budgeting" class="sidebar-link">
            <i class="bi bi-bullseye"></i>
            <span class="menu-text">Budgeting</span>
        </a>

        <a href="/analytics" class="sidebar-link">
            <i class="bi bi-bar-chart-fill"></i>
            <span class="menu-text">Analytics</span>
        </a>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="topbar mb-4">
            <h2 class="fw-bold">Dashboard</h2>
            <p class="text-muted mb-0">
                Pantau kondisi keuangan Anda secara real-time.
            </p>
        </div>

        <!-- CARDS -->
        <div class="row g-4">

            <div class="col-lg-4">
                <div class="card stat-card">
                    <div class="card-body">
                        <small class="text-muted">Total Pemasukan</small>

                        <h3 class="fw-bold mt-2"
                            th:text="'Rp ' + ${totalIncome != null ? #numbers.formatDecimal(totalIncome,0,'POINT',0,'COMMA') : '0'}">
                            Rp 0
                        </h3>

                        <div class="icon-box income mt-3">
                            <i class="bi bi-arrow-up"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card stat-card">
                    <div class="card-body">
                        <small class="text-muted">Total Pengeluaran</small>

                        <h3 class="fw-bold mt-2"
                            th:text="'Rp ' + ${totalExpense != null ? #numbers.formatDecimal(totalExpense,0,'POINT',0,'COMMA') : '0'}">
                            Rp 0
                        </h3>

                        <div class="icon-box expense mt-3">
                            <i class="bi bi-arrow-down"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card stat-card">
                    <div class="card-body">
                        <small class="text-muted">Saldo Saat Ini</small>

                        <h3 class="fw-bold mt-2"
                            th:text="'Rp ' + ${balance != null ? #numbers.formatDecimal(balance,0,'POINT',0,'COMMA') : '0'}">
                            Rp 0
                        </h3>

                        <div class="icon-box balance mt-3">
                            <i class="bi bi-wallet2"></i>
                        </div>
                    </div>
                </div>
            </div>

        </div>

<!-- TRANSAKSI -->
<div class="card table-card mt-5">
    <div class="card-body">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0">Transaksi Terbaru</h4>

            <a href="/transactions"
               class="btn btn-outline-primary btn-sm">
                Lihat Semua
            </a>
        </div>

        <table class="table align-middle">

            <thead>
            <tr>
                <th>No</th>
                <th>Tanggal</th>
                <th>Jenis</th>
                <th>Deskripsi</th>
                <th>Jumlah</th>
            </tr>
            </thead>

            <tbody>

            <tr th:if="${transactions == null || #lists.isEmpty(transactions)}">
                <td colspan="5"
                    class="text-center text-muted py-4">
                    Belum ada transaksi
                </td>
            </tr>

            <tr th:each="trx, stat : ${transactions}">

                <td th:text="${stat.count}"></td>

                <td th:text="${#temporals.format(trx.transactionDate,'dd MMM yyyy')}"></td>

                <td>

                    <span th:if="${trx.type != null and trx.type.name() == 'INCOME'}"
                          class="badge bg-success">
                        Pemasukan
                    </span>

                    <span th:if="${trx.type != null and trx.type.name() == 'EXPENSE'}"
                          class="badge bg-danger">
                        Pengeluaran
                    </span>

                </td>

                <td th:text="${trx.description}"></td>

                <td th:text="${trx.formattedAmount != null ? trx.formattedAmount : 'Rp 0'}"></td>

            </tr>

            </tbody>

        </table>

    </div>
</div>

    </div>
</div>

<script>
    const sidebar = document.getElementById("sidebar");
    document.getElementById("toggleBtn").addEventListener("click", () => {
        sidebar.classList.toggle("collapsed");
    });
</script>

</body>
</html>
