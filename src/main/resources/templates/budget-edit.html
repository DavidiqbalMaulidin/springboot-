<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DompetKuPlus - Edit Budget</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
            overflow-x:hidden;
        }

        #sidebar{
            width:260px;
            min-height:100vh;
            background:#111827;
            transition:.3s;
        }

        #sidebar.collapsed{
            width:80px;
        }

        #sidebar.collapsed .logo-text,
        #sidebar.collapsed .menu-text{
            display:none;
        }

        .sidebar-link{
            color:white;
            text-decoration:none;
            padding:12px 15px;
            border-radius:12px;
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:8px;
            transition:.3s;
        }

        .sidebar-link:hover{
            background:#1f2937;
        }

        .sidebar-link.active{
            background:linear-gradient(135deg,#2563eb,#4f46e5);
        }

        .content{
            flex:1;
            padding:30px;
        }

        .topbar{
            background:white;
            border-radius:20px;
            padding:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.05);
        }

        .table-card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.06);
        }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div id="sidebar" class="p-3">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="text-white m-0">
                <span class="logo-text">DompetKuPlus</span>
            </h4>

            <button id="toggleBtn" class="btn btn-sm btn-light">
                ☰
            </button>
        </div>

        <a href="/" class="sidebar-link">
            <i class="bi bi-grid-fill"></i>
            <span class="menu-text">Dashboard</span>
        </a>

        <a href="/transactions" class="sidebar-link">
            <i class="bi bi-cash-stack"></i>
            <span class="menu-text">Transaksi</span>
        </a>

        <a href="/budgeting" class="sidebar-link active">
            <i class="bi bi-bullseye"></i>
            <span class="menu-text">Budgeting</span>
        </a>

        <a href="/analytics" class="sidebar-link">
            <i class="bi bi-bar-chart-fill"></i>
            <span class="menu-text">Analytics</span>
        </a>

    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="topbar mb-4">
            <h2 class="fw-bold">Edit Budget</h2>
            <p class="text-muted mb-0">
                Perbarui data budget yang sudah ada.
            </p>
        </div>

        <div class="card table-card">
            <div class="card-body p-4">

                <form th:action="@{/budgeting/save}"
                      th:object="${budget}"
                      method="post">

                    <!-- ID Budget -->
                    <input type="hidden"
                           th:field="*{id}">

                    <!-- Kategori -->
                    <div class="mb-4">

                        <label class="form-label">
                            Kategori
                        </label>

                        <select th:field="*{category}"
                                class="form-select"
                                required>

                            <option th:each="c : ${categories}"
                                    th:value="${c.id}"
                                    th:text="${c.name}">
                            </option>

                        </select>

                    </div>

                    <!-- Limit -->
                    <div class="mb-4">

                        <label class="form-label">
                            Limit Budget
                        </label>

                        <div class="input-group">

                            <span class="input-group-text">
                                Rp
                            </span>

                            <input type="number"
                                   step="0.01"
                                   min="0"
                                   th:field="*{limitAmount}"
                                   class="form-control"
                                   required>

                        </div>

                    </div>

                    <!-- Tombol -->
                    <div class="d-flex gap-2">

                        <button type="submit"
                                class="btn btn-warning">

                            <i class="bi bi-pencil-square"></i>
                            Update Budget

                        </button>

                        <a href="/budgeting"
                           class="btn btn-outline-secondary">

                            Kembali

                        </a>

                    </div>

                </form>

            </div>
        </div>

    </div>

</div>

<script>
    const sidebar = document.getElementById("sidebar");

    document.getElementById("toggleBtn").addEventListener("click", () => {
        sidebar.classList.toggle("collapsed");
    });
</script>

</body>
</html>
