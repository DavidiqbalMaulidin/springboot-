<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DompetKuPlus - Transactions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
            overflow-x:hidden;
        }

        #sidebar{
            width:260px;
            min-height:100vh;
            background:#111827;
            transition:.3s;
        }

        #sidebar.collapsed{ width:80px; }

        #sidebar.collapsed .logo-text,
        #sidebar.collapsed .menu-text{
            display:none;
        }

        .sidebar-link{
            color:white;
            text-decoration:none;
            padding:12px 15px;
            border-radius:12px;
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:8px;
            transition:.3s;
        }

        .sidebar-link:hover{ background:#1f2937; }

        .sidebar-link.active{
            background:linear-gradient(135deg,#2563eb,#4f46e5);
        }

        .content{
            flex:1;
            padding:30px;
        }

        .topbar{
            background:white;
            border-radius:20px;
            padding:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.05);
        }

        .table-card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.06);
        }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR (SAMA DENGAN DASHBOARD) -->
    <div id="sidebar" class="p-3">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="text-white m-0">
                <span class="logo-text">DompetKuPlus</span>
            </h4>

            <button id="toggleBtn" class="btn btn-sm btn-light">☰</button>
        </div>

        <a href="/" class="sidebar-link">
            <i class="bi bi-grid-fill"></i>
            <span class="menu-text">Dashboard</span>
        </a>

        <a href="/transactions" class="sidebar-link active">
            <i class="bi bi-cash-stack"></i>
            <span class="menu-text">Transaksi</span>
        </a>

        <a href="/budgeting" class="sidebar-link">
            <i class="bi bi-bullseye"></i>
            <span class="menu-text">Budgeting</span>
        </a>

        <a href="/analytics" class="sidebar-link">
            <i class="bi bi-bar-chart-fill"></i>
            <span class="menu-text">Analytics</span>
        </a>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="topbar mb-4">
            <h2 class="fw-bold">Daftar Transaksi</h2>
            <p class="text-muted mb-0">
                Semua transaksi pemasukan dan pengeluaran Anda.
            </p>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <a href="/transactions/add" class="btn btn-success">
                + Tambah Transaksi
            </a>
        </div>

        <!-- TABLE -->
        <div class="card table-card">
            <div class="card-body">

                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>No</th>
                        <th>Tanggal</th>
                        <th>Jenis</th>
                        <th>Deskripsi</th>
                        <th>Kategori</th>
                        <th>Jumlah</th>
                        <th>Aksi</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:if="${transactions == null || #lists.isEmpty(transactions)}">
                        <td colspan="7" class="text-center text-muted">
                            Belum ada transaksi
                        </td>
                    </tr>

                    <tr th:each="t, stat : ${transactions}">

                        <td th:text="${stat.count}"></td>
                        <td th:text="${#temporals.format(t.transactionDate, 'dd MMM yyyy')}"></td>

                        <td>
                            <span th:if="${t.type != null and t.type.name() == 'INCOME'}"
                                  class="badge bg-success">
                                Pemasukan
                            </span>

                            <span th:if="${t.type != null and t.type.name() == 'EXPENSE'}"
                                  class="badge bg-danger">
                                Pengeluaran
                            </span>

                            <span th:if="${t.type == null}"
                                  class="badge bg-secondary">
                                -
                            </span>
                        </td>

                        <td th:text="${t.description}"></td>

                        <td th:text="${t.category != null ? t.category.name : '-'}"></td>

                        <td th:text="${t.formattedAmount != null ? t.formattedAmount : '0'}"></td>

                        <td>
                            <a th:href="@{/transactions/edit/{id}(id=${t.id})}"
                               class="btn btn-warning btn-sm">
                                Edit
                            </a>

                            <a th:href="@{/transactions/delete/{id}(id=${t.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Yakin ingin menghapus transaksi ini?')">
                                Hapus
                            </a>
                        </td>

                    </tr>

                    </tbody>
                </table>

            </div>
        </div>

    </div>
</div>

<script>
    const sidebar = document.getElementById("sidebar");
    document.getElementById("toggleBtn").addEventListener("click", () => {
        sidebar.classList.toggle("collapsed");
    });
</script>

</body>
</html>
