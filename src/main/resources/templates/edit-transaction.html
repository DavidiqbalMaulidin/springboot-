<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Transaksi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h2>Edit Transaksi</h2>

    <form th:action="@{/transactions/update}"
          th:object="${transaction}"
          method="post">

        <input type="hidden"
               th:field="*{id}">

        <div class="mb-3">

            <label class="form-label">
                Deskripsi
            </label>

            <input type="text"
                   th:field="*{description}"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Jumlah
            </label>

            <input type="number"
                   step="0.01"
                   th:field="*{amount}"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Tanggal
            </label>

            <input type="date"
                   th:field="*{transactionDate}"
                   class="form-control"
                   required>

        </div>

        <button type="submit"
                class="btn btn-primary">
            Update
        </button>

        <a href="/transactions"
           class="btn btn-secondary">
            Kembali
        </a>

    </form>

</div>

</body>
</html>
