<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Tambah Transaksi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h2>Tambah Transaksi</h2>

    <form th:action="@{/transactions/save}"
          th:object="${transaction}"
          method="post">

        <div class="mb-3">

            <label class="form-label">
                Deskripsi
            </label>

            <input type="text"
                   th:field="*{description}"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Jumlah
            </label>

            <input type="number"
                th:field="*{amount}"
                class="form-control"
                placeholder="Contoh: 100000"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Tanggal
            </label>

            <input type="date"
                   th:field="*{transactionDate}"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Jenis Transaksi
            </label>

            <select th:field="*{type}"
                    class="form-select"
                    required>

                <option value="">
                    Pilih Jenis Transaksi
                </option>

                <option value="INCOME">
                    Pemasukan
                </option>

                <option value="EXPENSE">
                    Pengeluaran
                </option>

            </select>

        </div>

        <button type="submit"
                class="btn btn-primary">
            Simpan
        </button>

        <a href="/transactions"
           class="btn btn-secondary">
            Kembali
        </a>

    </form>

</div>

</body>
</html>
